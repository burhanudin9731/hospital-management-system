<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="root" content="../../"/>
  <title>Prescriptions – Hospital Management System</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body data-page="prescriptions">
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="navbarContainer"></div>
    <div class="page-body">

      <div class="page-header">
        <div><h1>💊 Prescriptions</h1><p>Medicine prescriptions linked to medical records</p></div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Prescription</button>
      </div>

      <!-- Record info banner (shows if opened from medical_records.html) -->
      <div id="recordBanner" class="card" style="margin-bottom:20px;display:none">
        <div class="card-body" style="padding:14px 20px">
          <div id="recordBannerContent"></div>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="card-header">
          <h2>Prescription List</h2>
          <span id="tableCount" style="font-size:.8rem;color:var(--gray-5)"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Patient</th><th>Doctor</th><th>Medicine</th><th>Form</th><th>Qty</th><th>Instructions</th><th>Total Cost</th><th>Date</th></tr>
            </thead>
            <tbody id="prescBody">
              <tr><td colspan="9" style="text-align:center;padding:32px;color:var(--gray-5)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add Prescription Modal -->
<div class="modal-overlay" id="prescModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3>💊 Add Prescription</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert" id="prescAlert"></div>
      <form id="prescForm">
        <div class="form-grid">

          <div class="form-group full">
            <label>Medical Record *</label>
            <div class="input-wrap"><span class="input-icon">🩺</span>
              <select class="form-control" id="pr_record" name="record_id">
                <option value="">Select medical record...</option>
              </select>
            </div>
            <span class="field-error" id="prRecordError"></span>
          </div>

          <div class="form-group full">
            <label>Medicine *</label>
            <div class="input-wrap"><span class="input-icon">💊</span>
              <select class="form-control" id="pr_medicine" name="medicine_id" onchange="updateMedicineInfo()">
                <option value="">Select medicine...</option>
              </select>
            </div>
            <span class="field-error" id="prMedError"></span>
          </div>

          <!-- Medicine info row -->
          <div class="form-group full" id="medicineInfoRow" style="display:none">
            <div style="padding:10px 14px;background:var(--blue-light);border-radius:8px;font-size:.82rem;color:var(--blue-mid);display:flex;gap:20px" id="medicineInfo"></div>
          </div>

          <div class="form-group">
            <label>Quantity *</label>
            <div class="input-wrap"><span class="input-icon">🔢</span>
              <input type="number" class="form-control" id="pr_qty" name="quantity" min="1" placeholder="e.g. 14" oninput="calcCost()"/>
            </div>
            <span class="field-error" id="prQtyError"></span>
          </div>

          <div class="form-group">
            <label>Date</label>
            <div class="input-wrap"><span class="input-icon">📅</span>
              <input type="date" class="form-control" id="pr_date" name="prescribed_date"/>
            </div>
          </div>

          <div class="form-group full">
            <label>Dosage Instructions *</label>
            <textarea class="form-control" id="pr_dosage" name="dosage_instructions" rows="2" placeholder="e.g. Take 1 tablet twice daily after meals"></textarea>
            <span class="field-error" id="prDosError"></span>
          </div>

          <div class="form-group full" id="costRow" style="display:none">
            <div style="padding:10px 14px;background:var(--green-light);border-radius:8px;font-size:.9rem;font-weight:600;color:var(--green)">
              💰 Estimated Cost: <span id="estimatedCost">₺0.00</span>
            </div>
          </div>

        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="prescBtn" onclick="submitPrescription()">
        <span class="spinner" id="prSpinner"></span>
        <span id="prBtnText">Add Prescription</span>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../../js/validation.js"></script>
<script src="../../js/main.js"></script>
<script>
const BASE = '../../../backend/';
let medicines  = [];
let recordId   = null;

// Check if opened from medical_records page with ?record_id=
const params = new URLSearchParams(window.location.search);
recordId = params.get('record_id');

async function loadPrescriptions() {
  let url = BASE + 'prescriptions/read.php';
  if (recordId) url += `?record_id=${recordId}`;
  const data = await apiGet(url);
  if (!data.success) return;
  const rows = data.data || [];
  document.getElementById('tableCount').textContent = `${rows.length} prescription(s)`;
  const tbody = document.getElementById('prescBody');
  if (!rows.length) {
    tbody.innerHTML='<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">💊</div><p>No prescriptions found.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td style="color:var(--gray-5)">#${r.prescription_id}</td>
      <td style="font-weight:500">${r.patient_name||'—'}</td>
      <td>${r.doctor_name ? 'Dr. '+r.doctor_name : '—'}</td>
      <td><div style="font-weight:500">${r.medicine_name}</div></td>
      <td><span class="badge badge-blue">${r.dosage_form}</span></td>
      <td style="font-weight:600">${r.quantity}</td>
      <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gray-5)">${r.dosage_instructions}</td>
      <td style="font-weight:600;color:var(--green)">₺${parseFloat(r.total_cost||0).toFixed(2)}</td>
      <td>${fmtDate(r.prescribed_date)}</td>
    </tr>`).join('');
}

async function openModal() {
  // Load records
  const records = await apiGet(BASE+'medical_records/read.php');
  const recSel  = document.getElementById('pr_record');
  recSel.innerHTML = '<option value="">Select medical record...</option>';
  records.data?.forEach(r => {
    const opt = `<option value="${r.record_id}" ${r.record_id==recordId?'selected':''}>#${r.record_id} – ${r.patient_name} (${r.diagnosis?.slice(0,30)}...)</option>`;
    recSel.innerHTML += opt;
  });

  // Load medicines
  const meds = await apiGet(BASE+'medicines/read.php').catch(()=>({data:[]}));
  // Fallback hardcoded
  medicines = meds.data?.length ? meds.data : [
    {medicine_id:1,medicine_name:'Aspirin 100mg',     dosage_form:'Tablet',   unit_price:2.50, stock_quantity:500},
    {medicine_id:2,medicine_name:'Amoxicillin 500mg', dosage_form:'Capsule',  unit_price:8.00, stock_quantity:300},
    {medicine_id:3,medicine_name:'Paracetamol 500mg', dosage_form:'Tablet',   unit_price:1.50, stock_quantity:800},
    {medicine_id:4,medicine_name:'Ibuprofen 400mg',   dosage_form:'Tablet',   unit_price:4.00, stock_quantity:400},
    {medicine_id:5,medicine_name:'Metformin 500mg',   dosage_form:'Tablet',   unit_price:5.00, stock_quantity:600},
    {medicine_id:6,medicine_name:'Atorvastatin 20mg', dosage_form:'Tablet',   unit_price:12.00,stock_quantity:250},
    {medicine_id:7,medicine_name:'Omeprazole 20mg',   dosage_form:'Capsule',  unit_price:6.50, stock_quantity:350},
    {medicine_id:8,medicine_name:'Ciprofloxacin 500mg',dosage_form:'Tablet',  unit_price:15.00,stock_quantity:200},
    {medicine_id:9,medicine_name:'Salbutamol Syrup',  dosage_form:'Syrup',    unit_price:9.00, stock_quantity:150},
    {medicine_id:10,medicine_name:'Insulin Glargine', dosage_form:'Injection',unit_price:45.00,stock_quantity:100},
  ];
  const medSel = document.getElementById('pr_medicine');
  medSel.innerHTML = '<option value="">Select medicine...</option>';
  medicines.forEach(m => medSel.innerHTML += `<option value="${m.medicine_id}">${m.medicine_name} (${m.dosage_form}) – ₺${m.unit_price}</option>`);

  document.getElementById('pr_date').value = new Date().toISOString().split('T')[0];
  document.getElementById('prescModal').classList.add('open');
}

function updateMedicineInfo() {
  const id   = parseInt(document.getElementById('pr_medicine').value);
  const med  = medicines.find(m => m.medicine_id === id);
  const row  = document.getElementById('medicineInfoRow');
  if (!med) { row.style.display='none'; return; }
  document.getElementById('medicineInfo').innerHTML =
    `<span>📦 Form: <b>${med.dosage_form}</b></span><span>💰 Price: <b>₺${med.unit_price}</b></span><span>🏪 Stock: <b>${med.stock_quantity}</b></span>`;
  row.style.display='block';
  calcCost();
}

function calcCost() {
  const id  = parseInt(document.getElementById('pr_medicine').value);
  const qty = parseInt(document.getElementById('pr_qty').value) || 0;
  const med = medicines.find(m => m.medicine_id===id);
  if (!med||!qty) { document.getElementById('costRow').style.display='none'; return; }
  document.getElementById('estimatedCost').textContent = '₺'+(med.unit_price*qty).toFixed(2);
  document.getElementById('costRow').style.display='block';
}

async function submitPrescription() {
  const alert = document.getElementById('prescAlert');
  alert.className = 'alert';

  const recOk  = validateSelect(document.getElementById('pr_record'),   'prRecordError', 'medical record');
  const medOk  = validateSelect(document.getElementById('pr_medicine'), 'prMedError',    'medicine');
  const qtyEl  = document.getElementById('pr_qty');
  const qtyOk  = qtyEl.value>0 ? (setValid(qtyEl,'prQtyError'),true) : (setError(qtyEl,'prQtyError','Quantity must be at least 1.'),false);
  const dosEl  = document.getElementById('pr_dosage');
  const dosOk  = dosEl.value.trim() ? (setValid(dosEl,'prDosError'),true) : (setError(dosEl,'prDosError','Instructions are required.'),false);
  if (!recOk||!medOk||!qtyOk||!dosOk) return;

  document.getElementById('prescBtn').disabled=true;
  document.getElementById('prSpinner').style.display='block';
  document.getElementById('prBtnText').textContent='Adding...';

  try {
    const data = await apiPost(BASE+'prescriptions/create.php', new FormData(document.getElementById('prescForm')));
    if (data.success) {
      showToast(data.message,'success');
      closeModal();
      document.getElementById('prescForm').reset();
      loadPrescriptions();
    } else {
      alert.textContent='⚠️ '+data.message; alert.className='alert error visible';
    }
  } catch { alert.textContent='⚠️ Network error.'; alert.className='alert error visible'; }
  document.getElementById('prescBtn').disabled=false;
  document.getElementById('prSpinner').style.display='none';
  document.getElementById('prBtnText').textContent='Add Prescription';
}

function closeModal() { document.getElementById('prescModal').classList.remove('open'); }

document.addEventListener('DOMContentLoaded', () => {
  if (recordId) {
    document.getElementById('recordBanner').style.display='block';
    document.getElementById('recordBannerContent').innerHTML =
      `<span style="font-size:.85rem;color:var(--blue-mid)">📋 Showing prescriptions for <b>Medical Record #${recordId}</b> — <a href="medical_records.html" style="color:var(--blue-mid)">View all records</a></span>`;
  }
  loadPrescriptions();
});
</script>
</body>
</html>
