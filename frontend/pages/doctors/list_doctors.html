<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="root" content="../../"/>
  <title>Doctors – Hospital Management System</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body data-page="doctors">
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="navbarContainer"></div>
    <div class="page-body">

      <div class="page-header">
        <div><h1>👨‍⚕️ Doctors</h1><p>All registered doctors</p></div>
        <a href="add_doctors.html" class="btn btn-primary">+ Add Doctor</a>
      </div>

      <!-- Search bar -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-body" style="padding:14px 20px">
          <div class="search-bar">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search name or specialization..." oninput="filterTable()"/>
            </div>
            <select id="deptFilter" class="form-control" style="width:180px;padding:8px 10px" onchange="loadDoctors()">
              <option value="">All Departments</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear</button>
          </div>
        </div>
      </div>

      <!-- Doctor grid cards -->
      <div id="doctorGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-5)">Loading doctors...</div>
      </div>

    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ Edit Doctor</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <input type="hidden" id="edit_id" name="doctor_id"/>
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-wrap"><span class="input-icon">👤</span>
              <input type="text" class="form-control" id="edit_first" name="first_name"/>
            </div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <div class="input-wrap"><span class="input-icon">👤</span>
              <input type="text" class="form-control" id="edit_last" name="last_name"/>
            </div>
          </div>
          <div class="form-group full">
            <label>Specialization</label>
            <div class="input-wrap"><span class="input-icon">🩺</span>
              <input type="text" class="form-control" id="edit_spec" name="specialization"/>
            </div>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <div class="input-wrap"><span class="input-icon">📱</span>
              <input type="text" class="form-control" id="edit_phone" name="phone"/>
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <div class="input-wrap"><span class="input-icon">📧</span>
              <input type="email" class="form-control" id="edit_email" name="email"/>
            </div>
          </div>
          <div class="form-group full">
            <label>Department</label>
            <div class="input-wrap"><span class="input-icon">🏥</span>
              <select class="form-control" id="edit_dept" name="department_id">
                <option value="1">Cardiology</option><option value="2">Neurology</option>
                <option value="3">Pediatrics</option><option value="4">Orthopedics</option>
                <option value="5">Emergency</option><option value="6">Radiology</option>
              </select>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../../js/main.js"></script>
<script>
const BASE = '../../../backend/';
let allDoctors = [];

const DEPT_COLORS = ['blue','green','orange','purple','red','blue'];

async function loadDoctors() {
  const dept = document.getElementById('deptFilter').value;
  let url = BASE + 'doctors/read.php?search=';
  if (dept) url += `&department_id=${dept}`;
  const data = await apiGet(url);
  if (!data.success) return;
  allDoctors = data.data || [];
  renderGrid(allDoctors);
}

function renderGrid(doctors) {
  const grid = document.getElementById('doctorGrid');
  if (!doctors.length) {
    grid.innerHTML='<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-icon">👨‍⚕️</div><p>No doctors found.</p></div></div>';
    return;
  }
  grid.innerHTML = doctors.map(d => `
    <div class="card" style="padding:0">
      <div style="padding:20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--gray-3)">
        <div class="avatar" style="width:48px;height:48px;font-size:1.1rem;background:var(--blue-mid)">${initials('Dr '+d.last_name)}</div>
        <div>
          <div style="font-weight:600;font-size:.95rem">Dr. ${d.first_name} ${d.last_name}</div>
          <div style="font-size:.78rem;color:var(--gray-5)">${d.specialization}</div>
        </div>
      </div>
      <div style="padding:14px 20px;font-size:.82rem;line-height:2;color:var(--gray-7)">
        <div>🏥 <b>Dept:</b> ${d.dept_name}</div>
        <div>📱 <b>Phone:</b> ${d.phone}</div>
        <div>📧 <b>Email:</b> ${d.email}</div>
        <div>📅 <b>Appointments:</b> ${d.total_appointments}</div>
      </div>
      <div style="padding:12px 20px;border-top:1px solid var(--gray-3);display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" style="flex:1" onclick='openEdit(${JSON.stringify(d).replace(/"/g,"&quot;")})'>✏️ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDoctor(${d.doctor_id})">🗑️</button>
      </div>
    </div>`).join('');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderGrid(allDoctors.filter(d =>
    `${d.first_name} ${d.last_name}`.toLowerCase().includes(q) ||
    d.specialization?.toLowerCase().includes(q)
  ));
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('deptFilter').value  = '';
  loadDoctors();
}

function loadDeptFilter() {
  const depts = ['All','Cardiology','Neurology','Pediatrics','Orthopedics','Emergency','Radiology'];
  // Already has "All Departments" as first option, just leave it
}

function openEdit(d) {
  document.getElementById('edit_id').value    = d.doctor_id;
  document.getElementById('edit_first').value = d.first_name;
  document.getElementById('edit_last').value  = d.last_name;
  document.getElementById('edit_spec').value  = d.specialization;
  document.getElementById('edit_phone').value = d.phone;
  document.getElementById('edit_email').value = d.email;
  document.getElementById('edit_dept').value  = d.department_id;
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); }

async function saveEdit() {
  const data = await apiPost(BASE+'doctors/update.php', new FormData(document.getElementById('editForm')));
  if (data.success) { showToast('Doctor updated','success'); closeModal(); loadDoctors(); }
  else showToast(data.message,'error');
}

async function deleteDoctor(id) {
  if (!confirmDialog('Remove this doctor from the system?')) return;
  const fd = new FormData(); fd.append('doctor_id', id);
  const data = await apiPost(BASE+'doctors/delete.php', fd);
  if (data.success) { showToast('Doctor removed','success'); loadDoctors(); }
  else showToast(data.message,'error');
}

document.addEventListener('DOMContentLoaded', loadDoctors);
</script>
</body>
</html>
