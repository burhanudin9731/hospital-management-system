<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="root" content="../../"/>
  <title>Book Appointment – Hospital Management System</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body data-page="book">
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="navbarContainer"></div>
    <div class="page-body">

      <div class="page-header">
        <div>
          <h1>📝 Book Appointment</h1>
          <p>Schedule a new patient appointment</p>
        </div>
        <a href="list_appointment.html" class="btn btn-ghost">← All Appointments</a>
      </div>

      <div style="display:grid;grid-template-columns:1fr 340px;gap:20px">

        <!-- Form card -->
        <div class="card">
          <div class="card-header"><h2>Appointment Details</h2></div>
          <div class="card-body">
            <div class="alert" id="alertBox"></div>
            <form id="apptForm" novalidate>
              <div class="form-grid">

                <div class="form-group">
                  <label>Patient *</label>
                  <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <select class="form-control" id="patient_id" name="patient_id">
                      <option value="">Select patient...</option>
                    </select>
                  </div>
                  <span class="field-error" id="patientError"></span>
                </div>

                <div class="form-group">
                  <label>Doctor *</label>
                  <div class="input-wrap">
                    <span class="input-icon">👨‍⚕️</span>
                    <select class="form-control" id="doctor_id" name="doctor_id">
                      <option value="">Select doctor...</option>
                    </select>
                  </div>
                  <span class="field-error" id="doctorError"></span>
                </div>

                <div class="form-group">
                  <label>Date *</label>
                  <div class="input-wrap">
                    <span class="input-icon">📅</span>
                    <input type="date" class="form-control" id="appt_date" name="appt_date"/>
                  </div>
                  <span class="field-error" id="dateError"></span>
                </div>

                <div class="form-group">
                  <label>Time *</label>
                  <div class="input-wrap">
                    <span class="input-icon">🕐</span>
                    <select class="form-control" id="appt_time" name="appt_time">
                      <option value="">Select time slot...</option>
                    </select>
                  </div>
                  <span class="field-error" id="timeError"></span>
                </div>

                <div class="form-group full">
                  <label>Reason for Visit</label>
                  <div class="input-wrap">
                    <textarea class="form-control" id="reason" name="reason" placeholder="Describe the reason for this appointment..."></textarea>
                  </div>
                </div>

                <div class="form-group full">
                  <label>Additional Notes</label>
                  <div class="input-wrap">
                    <textarea class="form-control" id="notes" name="notes" placeholder="Any additional notes..."></textarea>
                  </div>
                </div>

              </div>
              <div style="margin-top:20px;display:flex;gap:10px">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                  <span class="spinner" id="spinner"></span>
                  <span id="btnText">📅 Book Appointment</span>
                </button>
                <button type="reset" class="btn btn-ghost">Clear</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Info panel -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <!-- Doctor info card -->
          <div class="card" id="doctorInfoCard" style="display:none">
            <div class="card-header"><h2>👨‍⚕️ Doctor Info</h2></div>
            <div class="card-body" id="doctorInfoBody"></div>
          </div>

          <!-- Patient info card -->
          <div class="card" id="patientInfoCard" style="display:none">
            <div class="card-header"><h2>👤 Patient Info</h2></div>
            <div class="card-body" id="patientInfoBody"></div>
          </div>

          <!-- Tips -->
          <div class="card">
            <div class="card-header"><h2>💡 Tips</h2></div>
            <div class="card-body" style="font-size:.8rem;color:var(--gray-5);line-height:1.8">
              <p>• Select a patient and doctor first</p>
              <p>• Choose a future date only</p>
              <p>• Time slots are 30 minutes each</p>
              <p>• Check doctor availability before booking</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="../../js/validation.js"></script>
<script src="../../js/main.js"></script>
<script>
const BASE = '../../../backend/';

// Set min date to today
document.getElementById('appt_date').min = new Date().toISOString().split('T')[0];

// Generate time slots 08:00 – 17:30 every 30 min
function buildTimeSlots() {
  const sel = document.getElementById('appt_time');
  for (let h = 8; h < 18; h++) {
    ['00','30'].forEach(m => {
      const val  = `${String(h).padStart(2,'0')}:${m}:00`;
      const label= `${String(h).padStart(2,'0')}:${m}`;
      sel.innerHTML += `<option value="${val}">${label}</option>`;
    });
  }
}
buildTimeSlots();

// Load patients dropdown
async function loadPatients() {
  const data = await apiGet(BASE + 'patients/read.php');
  const sel  = document.getElementById('patient_id');
  if (data.success) {
    data.data.forEach(p => {
      sel.innerHTML += `<option value="${p.patient_id}">${p.first_name} ${p.last_name} — ${p.phone}</option>`;
    });
  }
}

// Load doctors dropdown
async function loadDoctors() {
  const data = await apiGet(BASE + 'doctors/read.php');
  const sel  = document.getElementById('doctor_id');
  if (data.success) {
    data.data.forEach(d => {
      sel.innerHTML += `<option value="${d.doctor_id}">Dr. ${d.first_name} ${d.last_name} (${d.specialization})</option>`;
    });
  }
}

// Show patient info on select
document.getElementById('patient_id').addEventListener('change', async function() {
  const id = this.value;
  const card = document.getElementById('patientInfoCard');
  if (!id) { card.style.display='none'; return; }
  const data = await apiGet(BASE + `patients/read.php?id=${id}`);
  if (data.success && data.data) {
    const p = data.data;
    document.getElementById('patientInfoBody').innerHTML = `
      <div style="font-size:.85rem;line-height:2">
        <div><b>Name:</b> ${p.first_name} ${p.last_name}</div>
        <div><b>Phone:</b> ${p.phone}</div>
        <div><b>Blood Type:</b> ${p.blood_type||'—'}</div>
        <div><b>Gender:</b> ${p.gender}</div>
      </div>`;
    card.style.display='block';
  }
});

// Show doctor info on select
document.getElementById('doctor_id').addEventListener('change', async function() {
  const id = this.value;
  const card = document.getElementById('doctorInfoCard');
  if (!id) { card.style.display='none'; return; }
  const data = await apiGet(BASE + `doctors/read.php?id=${id}`);
  if (data.success && data.data) {
    const d = data.data;
    document.getElementById('doctorInfoBody').innerHTML = `
      <div style="font-size:.85rem;line-height:2">
        <div><b>Name:</b> Dr. ${d.first_name} ${d.last_name}</div>
        <div><b>Specialization:</b> ${d.specialization}</div>
        <div><b>Department:</b> ${d.dept_name}</div>
        <div><b>Phone:</b> ${d.phone}</div>
      </div>`;
    card.style.display='block';
  }
});

// Form submit
document.getElementById('apptForm').addEventListener('submit', async e => {
  e.preventDefault();
  const alert = document.getElementById('alertBox');
  alert.className = 'alert';

  const patOk  = validateSelect(document.getElementById('patient_id'), 'patientError', 'patient');
  const docOk  = validateSelect(document.getElementById('doctor_id'),  'doctorError',  'doctor');
  const dateOk = validateFutureDate(document.getElementById('appt_date'), 'dateError');
  const timeOk = validateSelect(document.getElementById('appt_time'),  'timeError',    'time slot');
  if (!patOk||!docOk||!dateOk||!timeOk) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled=true;
  document.getElementById('spinner').style.display='block';
  document.getElementById('btnText').textContent='Booking...';

  try {
    const data = await apiPost(BASE+'appointments/create.php', new FormData(e.target));
    if (data.success) {
      showToast(data.message, 'success');
      e.target.reset();
      document.getElementById('doctorInfoCard').style.display='none';
      document.getElementById('patientInfoCard').style.display='none';
    } else {
      alert.textContent='⚠️ '+data.message;
      alert.className='alert error visible';
    }
  } catch {
    alert.textContent='⚠️ Network error.';
    alert.className='alert error visible';
  }
  btn.disabled=false;
  document.getElementById('spinner').style.display='none';
  document.getElementById('btnText').textContent='📅 Book Appointment';
});

document.addEventListener('DOMContentLoaded', () => { loadPatients(); loadDoctors(); });
</script>
</body>
</html>
