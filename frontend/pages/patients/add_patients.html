<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="root" content="../../"/>
  <title>Add Patient – Hospital Management System</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body data-page="add-patient">
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="navbarContainer"></div>
    <div class="page-body">

      <div class="page-header">
        <div><h1>➕ Add New Patient</h1><p>Register a new patient in the system</p></div>
        <a href="list_patients.html" class="btn btn-ghost">← Back to List</a>
      </div>

      <div class="alert" id="alertBox"></div>

      <div class="card">
        <div class="card-header"><h2>👤 Patient Information</h2></div>
        <div class="card-body">
          <form id="addForm" novalidate>
            <div class="form-grid">
              <div class="form-group">
                <label>First Name *</label>
                <div class="input-wrap"><span class="input-icon">👤</span>
                <input class="form-control" id="first_name" name="first_name" placeholder="First name" required/></div>
                <span class="field-error" id="firstErr"></span>
              </div>
              <div class="form-group">
                <label>Last Name *</label>
                <div class="input-wrap"><span class="input-icon">👤</span>
                <input class="form-control" id="last_name" name="last_name" placeholder="Last name" required/></div>
                <span class="field-error" id="lastErr"></span>
              </div>
              <div class="form-group">
                <label>Date of Birth *</label>
                <div class="input-wrap"><span class="input-icon">📅</span>
                <input type="date" class="form-control" id="dob" name="dob" required/></div>
                <span class="field-error" id="dobErr"></span>
              </div>
              <div class="form-group">
                <label>Gender *</label>
                <select class="form-control no-icon" id="gender" name="gender">
                  <option value="">Select gender</option>
                  <option>Male</option><option>Female</option><option>Other</option>
                </select>
                <span class="field-error" id="genderErr"></span>
              </div>
              <div class="form-group">
                <label>Blood Type</label>
                <select class="form-control no-icon" id="blood_type" name="blood_type">
                  <option value="">Unknown</option>
                  <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                  <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
                </select>
              </div>
              <div class="form-group">
                <label>Phone *</label>
                <div class="input-wrap"><span class="input-icon">📱</span>
                <input class="form-control" id="phone" name="phone" placeholder="05XXXXXXXXX" required/></div>
                <span class="field-error" id="phoneErr"></span>
              </div>
              <div class="form-group full">
                <label>Email</label>
                <div class="input-wrap"><span class="input-icon">📧</span>
                <input type="email" class="form-control" id="email" name="email" placeholder="patient@email.com"/></div>
              </div>
              <div class="form-group full">
                <label>Address</label>
                <textarea class="form-control" id="address" name="address" placeholder="Street, City, Postal Code"></textarea>
              </div>

              <div style="grid-column:1/-1;border-top:1px solid var(--gray-3);padding-top:16px;margin-top:4px">
                <p style="font-size:.8rem;font-weight:600;color:var(--gray-5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Emergency Contact</p>
              </div>

              <div class="form-group">
                <label>Contact Name</label>
                <div class="input-wrap"><span class="input-icon">🆘</span>
                <input class="form-control" id="emergency_contact" name="emergency_contact" placeholder="Full name"/></div>
              </div>
              <div class="form-group">
                <label>Contact Phone</label>
                <div class="input-wrap"><span class="input-icon">📞</span>
                <input class="form-control" id="emergency_phone" name="emergency_phone" placeholder="05XXXXXXXXX"/></div>
              </div>
            </div>

            <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:24px;padding-top:16px;border-top:1px solid var(--gray-3)">
              <a href="list_patients.html" class="btn btn-ghost">Cancel</a>
              <button type="submit" class="btn btn-primary" id="submitBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">➕ Add Patient</span>
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast"></div>
<script src="../../js/validation.js"></script>
<script src="../../js/main.js"></script>
<script>
const BASE = '../../../backend/patients/';

document.getElementById('addForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const fnOk = validateRequired(document.getElementById('first_name'), 'firstErr', 'First name');
  const lnOk = validateRequired(document.getElementById('last_name'),  'lastErr',  'Last name');
  const dobOk = validateDOB(document.getElementById('dob'), 'dobErr');
  const gnOk  = validateSelect(document.getElementById('gender'), 'genderErr', 'gender');
  const phOk  = validatePhone(document.getElementById('phone'), 'phoneErr');
  if (!fnOk||!lnOk||!dobOk||!gnOk||!phOk) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('btnText').textContent = 'Saving…';

  const res = await apiPost(BASE + 'create.php', new FormData(document.getElementById('addForm')));

  if (res.success) {
    showToast(res.message, 'success');
    setTimeout(() => window.location.href = 'list_patients.html', 1200);
  } else {
    const a = document.getElementById('alertBox');
    a.textContent = '⚠️ ' + res.message; a.className = 'alert error visible';
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('btnText').textContent = '➕ Add Patient';
  }
});
</script>
</body>
</html>
