<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="root" content="../../"/>
  <title>Patient List – Hospital Management System</title>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body data-page="patients">
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="navbarContainer"></div>
    <div class="page-body">

      <div class="page-header">
        <div><h1>👥 Patients</h1><p>Manage all registered patients</p></div>
        <a href="add_patients.html" class="btn btn-primary">+ Add Patient</a>
      </div>

      <!-- Search -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-body" style="padding:14px 20px">
          <div class="search-bar">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search by name, phone or email…"/>
            </div>
            <button class="btn btn-ghost" id="searchBtn">Search</button>
            <button class="btn btn-ghost" id="clearBtn">Clear</button>
            <span style="margin-left:auto;font-size:.8rem;color:var(--gray-5)" id="countLabel"></span>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="table-wrap">
          <table id="patientsTable">
            <thead>
              <tr>
                <th>#</th><th>Patient</th><th>Age / Gender</th>
                <th>Blood</th><th>Phone</th><th>Email</th>
                <th>Registered</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="patientsBody">
              <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-5)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ Edit Patient</h3>
      <button class="modal-close" id="closeEdit">✕</button>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <input type="hidden" id="editId"/>
        <div class="form-grid">
          <div class="form-group"><label>First Name</label><div class="input-wrap"><span class="input-icon">👤</span><input class="form-control" id="editFirst" required/></div></div>
          <div class="form-group"><label>Last Name</label><div class="input-wrap"><span class="input-icon">👤</span><input class="form-control" id="editLast" required/></div></div>
          <div class="form-group"><label>Date of Birth</label><div class="input-wrap"><span class="input-icon">📅</span><input type="date" class="form-control" id="editDob"/></div></div>
          <div class="form-group"><label>Gender</label><select class="form-control no-icon" id="editGender"><option>Male</option><option>Female</option><option>Other</option></select></div>
          <div class="form-group"><label>Blood Type</label><select class="form-control no-icon" id="editBlood"><option value="">Unknown</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
          <div class="form-group"><label>Phone</label><div class="input-wrap"><span class="input-icon">📱</span><input class="form-control" id="editPhone" required/></div></div>
          <div class="form-group full"><label>Email</label><div class="input-wrap"><span class="input-icon">📧</span><input type="email" class="form-control" id="editEmail"/></div></div>
          <div class="form-group full"><label>Address</label><textarea class="form-control" id="editAddress"></textarea></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="cancelEdit">Cancel</button>
      <button class="btn btn-primary" id="saveEdit">💾 Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../../js/main.js"></script>
<script>
const BASE = '../../../backend/patients/';

async function loadPatients(search='') {
  const data = await apiGet(BASE + 'read.php?search=' + encodeURIComponent(search));
  const tbody = document.getElementById('patientsBody');
  document.getElementById('countLabel').textContent = `${data.count} patient(s) found`;

  if (!data.data?.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">👥</div><p>No patients found.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.data.map((p,i) => `
    <tr>
      <td>${i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar">${initials(p.first_name+' '+p.last_name)}</div>
          <div>
            <div style="font-weight:600">${p.first_name} ${p.last_name}</div>
            <div style="font-size:.75rem;color:var(--gray-5)">ID: ${p.patient_id}</div>
          </div>
        </div>
      </td>
      <td>${p.age} yrs / ${p.gender}</td>
      <td>${p.blood_type ? `<span class="badge badge-red">${p.blood_type}</span>` : '—'}</td>
      <td>${p.phone}</td>
      <td>${p.email||'—'}</td>
      <td>${fmtDate(p.registered_at)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${p.patient_id})">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deletePatient(${p.patient_id},'${p.first_name} ${p.last_name}')">🗑️</button>
        </div>
      </td>
    </tr>`).join('');
}

async function openEdit(id) {
  const data = await apiGet(BASE + 'read.php?id=' + id);
  const p = data.data;
  document.getElementById('editId').value    = p.patient_id;
  document.getElementById('editFirst').value = p.first_name;
  document.getElementById('editLast').value  = p.last_name;
  document.getElementById('editDob').value   = p.date_of_birth;
  document.getElementById('editGender').value= p.gender;
  document.getElementById('editBlood').value = p.blood_type||'';
  document.getElementById('editPhone').value = p.phone;
  document.getElementById('editEmail').value = p.email||'';
  document.getElementById('editAddress').value = p.address||'';
  document.getElementById('editModal').classList.add('open');
}

async function deletePatient(id, name) {
  if (!confirmDialog(`Delete patient "${name}"? This cannot be undone.`)) return;
  const fd = new FormData(); fd.append('patient_id', id);
  const res = await apiPost(BASE + 'delete.php', fd);
  showToast(res.message, res.success ? 'success' : 'error');
  if (res.success) loadPatients();
}

document.getElementById('saveEdit').addEventListener('click', async () => {
  const fd = new FormData();
  fd.append('patient_id', document.getElementById('editId').value);
  fd.append('first_name', document.getElementById('editFirst').value);
  fd.append('last_name',  document.getElementById('editLast').value);
  fd.append('dob',        document.getElementById('editDob').value);
  fd.append('gender',     document.getElementById('editGender').value);
  fd.append('blood_type', document.getElementById('editBlood').value);
  fd.append('phone',      document.getElementById('editPhone').value);
  fd.append('email',      document.getElementById('editEmail').value);
  fd.append('address',    document.getElementById('editAddress').value);
  const res = await apiPost(BASE + 'update.php', fd);
  showToast(res.message, res.success ? 'success' : 'error');
  if (res.success) { document.getElementById('editModal').classList.remove('open'); loadPatients(); }
});

document.getElementById('searchBtn').addEventListener('click', () => loadPatients(document.getElementById('searchInput').value));
document.getElementById('clearBtn').addEventListener('click',  () => { document.getElementById('searchInput').value=''; loadPatients(); });
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Enter') loadPatients(e.target.value); });
document.getElementById('closeEdit').addEventListener('click',  () => document.getElementById('editModal').classList.remove('open'));
document.getElementById('cancelEdit').addEventListener('click', () => document.getElementById('editModal').classList.remove('open'));

document.addEventListener('DOMContentLoaded', () => loadPatients());
</script>
</body>
</html>
